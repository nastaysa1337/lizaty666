name: Update candle price

on:
  push:
    paths:
      - ".github/workflows/update-candle-price.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update price and remove one-time workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("candles.html")
          s = p.read_text(encoding="utf-8")
          s = s.replace("разрыв энергосвязей 2 766 ₽", "разрыв энергосвязей 3 666 ₽")
          s = s.replace(
              '<div class="prod-price">2 766 ₽</div><div class="prod-name">Разрыв энергосвязей</div>',
              '<div class="prod-price">3 666 ₽</div><div class="prod-name">Разрыв энергосвязей</div>',
          )
          p.write_text(s, encoding="utf-8")
          Path(".github/workflows/update-candle-price.yml").unlink(missing_ok=True)
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add candles.html .github/workflows/update-candle-price.yml
          git commit -m "Update energy ties price to 3666" || exit 0
          git push

name: Editorial redesign audit

on:
  push:
    branches:
      - agent/editorial-astrology-redesign

permissions:
  contents: write

jobs:
  redesign:
    if: >-
      github.event.head_commit.message == 'chore: inject editorial design system' ||
      github.event.head_commit.message == 'style: polish editorial redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Connect design system without touching content
        if: github.event.head_commit.message == 'chore: inject editorial design system'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          css_tag = '<link rel="stylesheet" href="editorial-redesign.css">'
          script_tag = '<script src="app.js" defer></script>'

          for path in sorted(Path('.').glob('*.html')):
              original = path.read_text(encoding='utf-8')
              updated = original

              if 'editorial-redesign.css' not in updated:
                  updated = updated.replace('</head>', f'{css_tag}\n</head>', 1)

              if 'src="app.js"' not in updated and "src='app.js'" not in updated:
                  updated = updated.replace('</body>', f'{script_tag}\n</body>', 1)

              if updated != original:
                  path.write_text(updated, encoding='utf-8')
          PY

      - name: Verify immutable HTML content
        shell: bash
        run: |
          git fetch origin main
          python - <<'PY'
          import re
          import subprocess
          from html.parser import HTMLParser
          from pathlib import Path

          css_tag = '<link rel="stylesheet" href="editorial-redesign.css">\n'
          script_tag = '<script src="app.js" defer></script>\n'

          class SnapshotParser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=False)
                  self.hidden = 0
                  self.text = []
                  self.links = []
                  self.forms = []
                  self.ids = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if tag in {'script', 'style'}:
                      self.hidden += 1
                  if 'id' in attrs:
                      self.ids.append(attrs['id'])
                  if tag == 'a' and 'href' in attrs:
                      self.links.append(attrs['href'])
                  if tag == 'form':
                      self.forms.append((attrs.get('action', ''), attrs.get('method', '')))

              def handle_endtag(self, tag):
                  if tag in {'script', 'style'} and self.hidden:
                      self.hidden -= 1

              def handle_data(self, data):
                  if not self.hidden and data.strip():
                      self.text.append(data)

          failures = []
          report = []

          for path in sorted(Path('.').glob('*.html')):
              baseline = subprocess.check_output(
                  ['git', 'show', f'origin/main:{path.as_posix()}'],
                  text=True,
                  encoding='utf-8'
              )
              current = path.read_text(encoding='utf-8')
              cleaned = current.replace(css_tag, '').replace(script_tag, '')

              if cleaned != baseline:
                  failures.append(f'{path}: non-resource HTML changed')

              before = SnapshotParser()
              after = SnapshotParser()
              before.feed(baseline)
              after.feed(current)

              if before.text != after.text:
                  failures.append(f'{path}: visible text changed')
              if before.links != after.links:
                  failures.append(f'{path}: links changed')
              if before.forms != after.forms:
                  failures.append(f'{path}: forms changed')
              if len(after.ids) != len(set(after.ids)):
                  failures.append(f'{path}: duplicate ids detected')

              before_prices = re.findall(r'\d[\d\s]*₽(?:\s*/\s*час)?', ''.join(before.text))
              after_prices = re.findall(r'\d[\d\s]*₽(?:\s*/\s*час)?', ''.join(after.text))
              if before_prices != after_prices:
                  failures.append(f'{path}: prices changed')

              report.append({
                  'file': path.as_posix(),
                  'visible_text_nodes': len(after.text),
                  'links': len(after.links),
                  'prices': after_prices,
              })

          Path('audit').mkdir(exist_ok=True)
          Path('audit/content-guard.txt').write_text(
              '\n'.join(str(item) for item in report) + '\n',
              encoding='utf-8'
          )

          if failures:
              raise SystemExit('\n'.join(failures))
          PY

      - name: Install validation tools
        shell: bash
        run: |
          mkdir -p /tmp/editorial-qa
          cd /tmp/editorial-qa
          npm init -y >/dev/null 2>&1
          npm install --silent eslint@8 typescript playwright @axe-core/playwright
          npx playwright install --with-deps chromium

      - name: Lint and typecheck
        shell: bash
        run: |
          node --check app.js

          cat >/tmp/editorial-qa/.eslintrc.json <<'JSON'
          {
            "env": {"browser": true, "es2021": true},
            "parserOptions": {"ecmaVersion": 2021},
            "rules": {
              "no-undef": "error",
              "no-unused-vars": ["error", {"args": "none"}]
            }
          }
          JSON

          /tmp/editorial-qa/node_modules/.bin/eslint app.js --config /tmp/editorial-qa/.eslintrc.json

          cat >/tmp/editorial-qa/globals.d.ts <<'TS'
          interface Window {
            openMenu: (button?: HTMLElement) => void;
            closeMenu: () => void;
            openMob: (button?: HTMLElement) => void;
            closeMob: () => void;
            toggleFaq: (button: HTMLElement) => void;
            toggleExpand: (button: HTMLElement) => void;
          }
          TS

          /tmp/editorial-qa/node_modules/.bin/tsc \
            --allowJs \
            --checkJs \
            --noEmit \
            --skipLibCheck \
            --target ES2020 \
            --lib DOM,ES2020 \
            app.js /tmp/editorial-qa/globals.d.ts

      - name: Validate routes and production build
        shell: bash
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse
          import shutil

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.has_html = False
                  self.has_head = False
                  self.has_body = False

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  self.has_html = self.has_html or tag == 'html'
                  self.has_head = self.has_head or tag == 'head'
                  self.has_body = self.has_body or tag == 'body'
                  if tag == 'a' and attrs.get('href'):
                      self.links.append(attrs['href'])

          failures = []
          pages = sorted(Path('.').glob('*.html'))
          for page in pages:
              parser = LinkParser()
              parser.feed(page.read_text(encoding='utf-8'))
              if not (parser.has_html and parser.has_head and parser.has_body):
                  failures.append(f'{page}: missing html/head/body')
              for href in parser.links:
                  parsed = urlparse(href)
                  if parsed.scheme or href.startswith(('#', 'mailto:', 'tel:')):
                      continue
                  route = parsed.path
                  if not route or route == '/':
                      continue
                  target = Path(route.lstrip('/'))
                  if target.suffix == '.html' and not target.exists():
                      failures.append(f'{page}: missing route {href}')

          dist = Path('dist')
          if dist.exists():
              shutil.rmtree(dist)
          dist.mkdir()

          for pattern in ('*.html', '*.css', '*.js', '*.xml', '*.txt'):
              for source in Path('.').glob(pattern):
                  shutil.copy2(source, dist / source.name)
          for name in ('CNAME', 'robots.txt', 'sitemap.xml'):
              source = Path(name)
              if source.exists():
                  shutil.copy2(source, dist / source.name)
          if Path('assets').exists():
              shutil.copytree('assets', dist / 'assets')

          required = ['index.html', 'astrology.html', 'runes.html', 'candles.html', 'education.html', 'app.js', 'editorial-redesign.css']
          for name in required:
              if not (dist / name).exists():
                  failures.append(f'dist: missing {name}')

          if failures:
              raise SystemExit('\n'.join(failures))
          PY

      - name: Capture before and after screenshots
        shell: bash
        env:
          NODE_PATH: /tmp/editorial-qa/node_modules
        run: |
          rm -rf /tmp/editorial-baseline
          git worktree add --detach /tmp/editorial-baseline origin/main

          python -m http.server 8010 --directory /tmp/editorial-baseline >/tmp/editorial-baseline.log 2>&1 &
          BASELINE_PID=$!
          python -m http.server 8011 --directory "$GITHUB_WORKSPACE" >/tmp/editorial-current.log 2>&1 &
          CURRENT_PID=$!
          trap 'kill $BASELINE_PID $CURRENT_PID || true' EXIT
          sleep 2

          cat >/tmp/editorial-qa/audit.cjs <<'JS'
          const fs = require('fs');
          const path = require('path');
          const { chromium } = require('playwright');
          const { AxeBuilder } = require('@axe-core/playwright');

          const workspace = process.env.GITHUB_WORKSPACE;
          const output = path.join(workspace, 'audit');
          fs.mkdirSync(output, { recursive: true });

          const pages = fs.readdirSync(workspace)
            .filter((name) => name.endsWith('.html'))
            .sort();

          const screenshotViewports = [
            { name: 'desktop', width: 1440, height: 1000 },
            { name: 'mobile', width: 390, height: 844 }
          ];
          const auditWidths = [320, 360, 390, 430, 768, 1024, 1440];
          const bases = [
            { name: 'before', url: 'http://127.0.0.1:8010' },
            { name: 'after', url: 'http://127.0.0.1:8011' }
          ];

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const report = {
              pages,
              overflow: [],
              consoleErrors: [],
              pageErrors: [],
              accessibility: [],
              performance: [],
              screenshots: []
            };

            for (const base of bases) {
              for (const viewport of screenshotViewports) {
                const context = await browser.newContext({ viewport });
                const page = await context.newPage();
                page.on('console', (message) => {
                  if (message.type() === 'error') {
                    report.consoleErrors.push({ base: base.name, page: page.url(), message: message.text() });
                  }
                });
                page.on('pageerror', (error) => {
                  report.pageErrors.push({ base: base.name, page: page.url(), message: String(error) });
                });

                for (const file of pages) {
                  await page.goto(`${base.url}/${file}`, { waitUntil: 'domcontentloaded' });
                  await page.waitForTimeout(500);
                  const folder = path.join(output, 'screenshots', base.name, viewport.name);
                  fs.mkdirSync(folder, { recursive: true });
                  const target = path.join(folder, `${file.replace('.html', '')}.png`);
                  await page.screenshot({ path: target, fullPage: true });
                  report.screenshots.push(path.relative(output, target));
                }
                await context.close();
              }
            }

            for (const width of auditWidths) {
              const context = await browser.newContext({ viewport: { width, height: 900 } });
              const page = await context.newPage();
              page.on('pageerror', (error) => {
                report.pageErrors.push({ base: 'after', page: page.url(), width, message: String(error) });
              });

              for (const file of pages) {
                const started = Date.now();
                await page.goto(`http://127.0.0.1:8011/${file}`, { waitUntil: 'domcontentloaded' });
                await page.waitForTimeout(350);

                const metrics = await page.evaluate(() => {
                  const root = document.documentElement;
                  const nav = performance.getEntriesByType('navigation')[0];
                  return {
                    viewport: window.innerWidth,
                    scrollWidth: root.scrollWidth,
                    bodyScrollWidth: document.body.scrollWidth,
                    domContentLoaded: nav ? nav.domContentLoadedEventEnd : 0,
                    resourceCount: performance.getEntriesByType('resource').length
                  };
                });

                if (metrics.scrollWidth > metrics.viewport + 2 || metrics.bodyScrollWidth > metrics.viewport + 2) {
                  report.overflow.push({ file, width, metrics });
                }

                report.performance.push({ file, width, elapsed: Date.now() - started, ...metrics });
              }
              await context.close();
            }

            const accessibilityPages = ['index.html', 'astrology.html', 'runes.html', 'candles.html', 'education.html', 'faq.html'];
            for (const file of accessibilityPages.filter((file) => pages.includes(file))) {
              const context = await browser.newContext({ viewport: { width: 390, height: 844 }, reducedMotion: 'reduce' });
              const page = await context.newPage();
              await page.goto(`http://127.0.0.1:8011/${file}`, { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(350);
              const results = await new AxeBuilder({ page }).analyze();
              report.accessibility.push({
                file,
                violations: results.violations.map((violation) => ({
                  id: violation.id,
                  impact: violation.impact,
                  description: violation.description,
                  nodes: violation.nodes.length
                }))
              });
              await context.close();
            }

            await browser.close();
            fs.writeFileSync(path.join(output, 'visual-audit.json'), JSON.stringify(report, null, 2));

            const criticalA11y = report.accessibility.flatMap((entry) =>
              entry.violations.filter((violation) => violation.impact === 'critical').map((violation) => ({ file: entry.file, ...violation }))
            );

            if (report.overflow.length || report.pageErrors.length || criticalA11y.length) {
              console.error(JSON.stringify({
                overflow: report.overflow,
                pageErrors: report.pageErrors,
                criticalA11y
              }, null, 2));
              process.exit(1);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          JS

          node /tmp/editorial-qa/audit.cjs

      - name: Commit resource connections
        if: github.event.head_commit.message == 'chore: inject editorial design system'
        shell: bash
        run: |
          git config user.name "openai-design-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if ! git diff --cached --quiet; then
            git commit -m "style: connect editorial design system"
            git push origin HEAD
          fi

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editorial-audit-${{ github.run_id }}
          path: audit
          if-no-files-found: warn
